services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.6
    container_name: openhands-app
    pull_policy: always
    environment:
      LOG_ALL_EVENTS: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      # OpenHands V1 Configuration
      RUNTIME: "docker"
      OH_PERSISTENCE_DIR: "/.openhands"
      # Agent Server (Latest)
      AGENT_SERVER_IMAGE_REPOSITORY: "ghcr.io/openhands/agent-server"
      AGENT_SERVER_IMAGE_TAG: "1.15.0-python"
      # LLM Configuration (V1 Standard)
      LLM_API_KEY: "${GEMINI_API_KEY}"
      LLM_MODEL: "gemini/gemini-3.1-flash-lite-preview"
      # Sandbox Configuration
      SANDBOX_VOLUMES: "./workspace:/workspace"
    ports:
      - "3000:3000"
    volumes:
      - ./openhands:/.openhands
      - ./workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: "1g"
          cpus: "1.0"
        reservations:
          memory: "512m"
          cpus: "0.5"
    networks:
      - openhands-net

networks:
  openhands-net:
    name: openhands-net
    driver: bridge
